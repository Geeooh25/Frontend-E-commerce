<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Beedaht Sweet Treats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FFB88C;
            --primary-dark: #E08A5A;
            --text-dark: #1F1F1F;
            --neutral-light: #F7F7F7;
            --neutral-medium: #EEEEEE;
            --success: #4CAF50;
            --error: #E53935;
        }

        body {
            background: linear-gradient(135deg, #ad9589 0%, #FFB88C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
        }

        .logo span {
            color: var(--primary);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--neutral-medium);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 184, 140, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 184, 140, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 3000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--error);
        }

        .notification.info {
            background: var(--primary);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .requirements {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }

        .requirements ul {
            list-style: none;
            padding-left: 0;
        }

        .requirements li {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .requirements li i {
            font-size: 0.8rem;
        }

        .requirements li.valid {
            color: var(--success);
        }

        .requirements li.invalid {
            color: #999;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <i class="fas fa-cookie-bite"></i>
            <h1>Beedaht<span>Treats</span></h1>
        </div>
        
        <h2>Reset Password</h2>
        
        <form id="reset-form">
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" required minlength="6" 
                       placeholder="Enter new password">
            </div>
            
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" required minlength="6" 
                       placeholder="Confirm new password">
            </div>
            
            <div class="requirements" id="password-requirements">
                <ul>
                    <li id="length-check" class="invalid">
                        <i class="fas fa-circle"></i> At least 6 characters
                    </li>
                    <li id="match-check" class="invalid">
                        <i class="fas fa-circle"></i> Passwords match
                    </li>
                </ul>
            </div>
            
            <button type="submit" class="btn" id="submit-btn">Reset Password</button>
        </form>
        
        <div class="back-to-login">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script>
        
        const API_BASE_URL = 'https://backend-e-commerce-production-b9b1.up.railway.app/api';
        
        // Firebase configuration  VALUES
        const firebaseConfig = {
            apiKey: "AIzaSyD0g5NGxzPrC98MFtTx4ZOePrHGGHqM0rU",
            authDomain: "beedaht-sweet-treats.firebaseapp.com",
            projectId: "beedaht-sweet-treats",
            storageBucket: "beedaht-sweet-treats.firebasestorage.app",
            messagingSenderId: "762048249430",
            appId: "1:762048249430:web:9e3b7c33dc517d6011c5f7"
        };
        
        // Get parameters from URL (Firebase style)
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');
        const apiKey = urlParams.get('apiKey');
        
        console.log('Mode:', mode);
        console.log('oobCode:', oobCode);
        console.log('API Key from URL:', apiKey);
        
        // Check if this is a valid reset link
        if (!oobCode || mode !== 'resetPassword') {
            showNotification('Invalid reset link. Please request a new one.', 'error');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        }
        
        // Password validation elements
        const newPassword = document.getElementById('new-password');
        const confirmPassword = document.getElementById('confirm-password');
        const lengthCheck = document.getElementById('length-check');
        const matchCheck = document.getElementById('match-check');
        const submitBtn = document.getElementById('submit-btn');
        
        // Validate password function
        function validatePassword() {
            const password = newPassword.value;
            const confirm = confirmPassword.value;
            
            // Check length
            if (password.length >= 6) {
                lengthCheck.className = 'valid';
                lengthCheck.innerHTML = '<i class="fas fa-check-circle"></i> At least 6 characters';
            } else {
                lengthCheck.className = 'invalid';
                lengthCheck.innerHTML = '<i class="fas fa-circle"></i> At least 6 characters';
            }
            
            // Check match
            if (password && confirm && password === confirm) {
                matchCheck.className = 'valid';
                matchCheck.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
            } else {
                matchCheck.className = 'invalid';
                matchCheck.innerHTML = '<i class="fas fa-circle"></i> Passwords match';
            }
        }
        
        newPassword.addEventListener('input', validatePassword);
        confirmPassword.addEventListener('input', validatePassword);
        
        // Function to load Firebase dynamically
        function loadFirebase() {
            return new Promise((resolve, reject) => {
                // Check if Firebase is already loaded
                if (typeof firebase !== 'undefined') {
                    resolve();
                    return;
                }
                
                // Load Firebase App
                const appScript = document.createElement('script');
                appScript.src = 'https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js';
                appScript.onload = () => {
                    // Load Firebase Auth
                    const authScript = document.createElement('script');
                    authScript.src = 'https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js';
                    authScript.onload = () => {
                        // Initialize Firebase
                        firebase.initializeApp(firebaseConfig);
                        console.log('Firebase initialized successfully');
                        resolve();
                    };
                    authScript.onerror = reject;
                    document.head.appendChild(authScript);
                };
                appScript.onerror = reject;
                document.head.appendChild(appScript);
            });
        }
        
        // Handle form submission
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPasswordValue = document.getElementById('new-password').value;
            const confirmPasswordValue = document.getElementById('confirm-password').value;
            
            if (newPasswordValue !== confirmPasswordValue) {
                showNotification('Passwords do not match', 'error');
                return;
            }
            
            if (newPasswordValue.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Show loading state
            submitBtn.textContent = 'Resetting Password...';
            submitBtn.disabled = true;
            
            try {
                
                await loadFirebase();
                
                console.log('Attempting to reset password with oobCode:', oobCode);
                
         
                await firebase.auth().confirmPasswordReset(oobCode, newPasswordValue);
                
                console.log('Password reset successful via Firebase');
                showNotification('Password reset successful! Redirecting to login...', 'success');
                
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/password-updated`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            oobCode: oobCode,
                            email: firebase.auth().currentUser?.email || 'unknown',
                            timestamp: new Date().toISOString()
                        })
                    });
                    
                    if (response.ok) {
                        console.log('Backend notified successfully');
                    }
                } catch (backendError) {
                    console.log('Backend notification failed (optional)', backendError);
                    // Don't show error to user - password reset already worked
                }
                
                // Redirect to login page
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Reset error:', error);
                
                let errorMessage = 'Error resetting password. ';
                
                // Handle specific Firebase errors
                if (error.code === 'auth/expired-action-code') {
                    errorMessage = 'This reset link has expired. Please request a new one.';
                } else if (error.code === 'auth/invalid-action-code') {
                    errorMessage = 'This reset link is invalid. Please request a new one.';
                } else if (error.code === 'auth/user-disabled') {
                    errorMessage = 'This account has been disabled.';
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = 'User not found.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Please choose a stronger password.';
                } else {
                    errorMessage += error.message;
                }
                
                showNotification(errorMessage, 'error');
                submitBtn.textContent = 'Reset Password';
                submitBtn.disabled = false;
            }
        });
        
        // Show notification function
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            
            let icon = 'check-circle';
            if (type === 'error') icon = 'times-circle';
            if (type === 'info') icon = 'info-circle';
            
            notification.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>

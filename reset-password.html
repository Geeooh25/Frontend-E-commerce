<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Beedaht Sweet Treats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FFB88C;
            --primary-dark: #E08A5A;
            --text-dark: #1F1F1F;
            --neutral-light: #F7F7F7;
            --neutral-medium: #EEEEEE;
            --success: #4CAF50;
            --error: #E53935;
            --warning: #FB8C00;
            --info: #42A5F5;
        }

        body {
            background: linear-gradient(135deg, #ad9589 0%, #FFB88C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
        }

        .logo span {
            color: var(--primary);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--neutral-medium);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 184, 140, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 184, 140, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 3000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--error);
        }

        .notification.warning {
            background: var(--warning);
        }

        .notification.info {
            background: var(--info);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .requirements {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }

        .requirements ul {
            list-style: none;
            padding-left: 0;
        }

        .requirements li {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .requirements li i {
            font-size: 0.8rem;
        }

        .requirements li.valid {
            color: var(--success);
        }

        .requirements li.invalid {
            color: #999;
        }

        /* Expired Link Styles */
        .expired-container {
            text-align: center;
            padding: 20px;
        }

        .expired-icon {
            font-size: 4rem;
            color: var(--warning);
            margin-bottom: 20px;
        }

        .expired-title {
            color: var(--warning);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .expired-message {
            color: var(--text-dark);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .expired-details {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #e65100;
            font-size: 0.95rem;
        }

        .timer-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border-left: 4px solid var(--primary);
        }

        .timer-box i {
            color: var(--primary);
            margin-right: 8px;
        }

        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #0d47a1;
            text-align: center;
        }

        .btn-link {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary);
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-link:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-link.secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-link.secondary:hover {
            background: #e0e0e0;
        }

        .email-highlight {
            background: var(--primary-light);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 600;
            color: var(--text-dark);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Content will be dynamically loaded here -->
    </div>
    
    <div id="notification" class="notification"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD0g5NGxzPrC98MFtTx4ZOePrHGGHqM0rU",
            authDomain: "beedaht-sweet-treats.firebaseapp.com",
            projectId: "beedaht-sweet-treats",
            storageBucket: "beedaht-sweet-treats.firebasestorage.app",
            messagingSenderId: "762048249430",
            appId: "1:762048249430:web:9e3b7c33dc517d6011c5f7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');
        const apiKey = urlParams.get('apiKey');
        
        console.log('Reset page loaded - Mode:', mode);
        console.log('oobCode:', oobCode ? 'Present' : 'Missing');

        // Main initialization
        window.onload = async function() {
            const appDiv = document.getElementById('app');
            
            // Check if we have valid reset parameters
            if (!oobCode || mode !== 'resetPassword') {
                showExpiredLink('Invalid reset link. Please request a new one.', '❌ Invalid Link');
                return;
            }

            try {
                // CRITICAL: Verify the code with Firebase FIRST
                // This checks if the code is valid and NOT EXPIRED
                console.log('🔍 Verifying reset code with Firebase...');
                const email = await firebase.auth().verifyPasswordResetCode(oobCode);
                
                console.log('✅ Reset code is VALID for email:', email);
                console.log('⏰ Code expires in 1 hour from generation');
                
                // Show the password reset form
                showResetForm(email);
                
            } catch (error) {
                console.error('❌ Code verification failed:', error);
                
                // Handle specific Firebase errors
                if (error.code === 'auth/expired-action-code') {
                    showExpiredLink(
                        'This password reset link has EXPIRED.', 
                        '⏰ Link Expired',
                        'For security reasons, password reset links are only valid for 1 hour. Please request a new link.'
                    );
                } else if (error.code === 'auth/invalid-action-code') {
                    showExpiredLink(
                        'This password reset link is INVALID.', 
                        '❌ Invalid Link',
                        'The link may have been used already or is corrupted. Please request a new one.'
                    );
                } else {
                    showExpiredLink(
                        error.message || 'An error occurred.', 
                        '⚠️ Error',
                        'Please try again or request a new reset link.'
                    );
                }
            }
        };

        // Function to show the password reset form
        function showResetForm(email) {
            const appDiv = document.getElementById('app');
            
            appDiv.innerHTML = `
                <div class="reset-container">
                    <div class="logo">
                        <i class="fas fa-cookie-bite"></i>
                        <h1>Beedaht<span>Treats</span></h1>
                    </div>
                    
                    <h2>Reset Password</h2>
                    
                    <div class="timer-box">
                        <i class="fas fa-clock"></i> 
                        <strong>Email:</strong> <span class="email-highlight">${email}</span>
                        <br>
                        <small style="color: #666; margin-top: 8px; display: block;">
                            <i class="fas fa-info-circle"></i> This link expires in 1 hour from when it was sent
                        </small>
                    </div>
                    
                    <form id="reset-form">
                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" required minlength="6" 
                                   placeholder="Enter new password">
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" required minlength="6" 
                                   placeholder="Confirm new password">
                        </div>
                        
                        <div class="requirements" id="password-requirements">
                            <ul>
                                <li id="length-check" class="invalid">
                                    <i class="fas fa-circle"></i> At least 6 characters
                                </li>
                                <li id="match-check" class="invalid">
                                    <i class="fas fa-circle"></i> Passwords match
                                </li>
                            </ul>
                        </div>
                        
                        <button type="submit" class="btn" id="submit-btn">Reset Password</button>
                    </form>
                    
                    <div class="back-to-login">
                        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    </div>
                </div>
            `;

            // Initialize form handlers
            initializeFormHandlers(oobCode);
        }

        // Function to show expired/invalid link message
        function showExpiredLink(message, title, details = '') {
            const appDiv = document.getElementById('app');
            
            appDiv.innerHTML = `
                <div class="reset-container">
                    <div class="expired-container">
                        <div class="expired-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h2 class="expired-title">${title}</h2>
                        <p class="expired-message">${message}</p>
                        
                        <div class="expired-details">
                            <i class="fas fa-clock"></i> 
                            ${details || 'Password reset links expire after 1 hour for security.'}
                        </div>
                        
                        <div style="margin-top: 30px;">
                            <a href="index.html" class="btn-link">
                                <i class="fas fa-home"></i> Go to Home
                            </a>
                            <a href="#" onclick="requestNewLink()" class="btn-link secondary" style="margin-left: 10px;">
                                <i class="fas fa-redo"></i> Request New Link
                            </a>
                        </div>
                        
                        <p style="margin-top: 25px; color: #999; font-size: 0.9rem;">
                            <i class="fas fa-shield-alt"></i> For your security, all reset links expire after 1 hour
                        </p>
                    </div>
                </div>
            `;
        }

        // Initialize form validation and submission
        function initializeFormHandlers(oobCode) {
            const newPassword = document.getElementById('new-password');
            const confirmPassword = document.getElementById('confirm-password');
            const lengthCheck = document.getElementById('length-check');
            const matchCheck = document.getElementById('match-check');
            const submitBtn = document.getElementById('submit-btn');
            const resetForm = document.getElementById('reset-form');

            // Validate password function
            function validatePassword() {
                const password = newPassword.value;
                const confirm = confirmPassword.value;
                
                // Check length
                if (password.length >= 6) {
                    lengthCheck.className = 'valid';
                    lengthCheck.innerHTML = '<i class="fas fa-check-circle"></i> At least 6 characters';
                } else {
                    lengthCheck.className = 'invalid';
                    lengthCheck.innerHTML = '<i class="fas fa-circle"></i> At least 6 characters';
                }
                
                // Check match
                if (password && confirm && password === confirm) {
                    matchCheck.className = 'valid';
                    matchCheck.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
                } else {
                    matchCheck.className = 'invalid';
                    matchCheck.innerHTML = '<i class="fas fa-circle"></i> Passwords match';
                }
            }

            newPassword.addEventListener('input', validatePassword);
            confirmPassword.addEventListener('input', validatePassword);

            // Handle form submission
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPasswordValue = newPassword.value;
                const confirmPasswordValue = confirmPassword.value;
                
                if (newPasswordValue !== confirmPasswordValue) {
                    showNotification('Passwords do not match', 'error');
                    return;
                }
                
                if (newPasswordValue.length < 6) {
                    showNotification('Password must be at least 6 characters', 'error');
                    return;
                }
                
                // Show loading state
                submitBtn.textContent = 'Resetting Password...';
                submitBtn.disabled = true;
                
                try {
                    console.log('Attempting to reset password with oobCode:', oobCode);
                    
                    // Complete the password reset with Firebase
                    await firebase.auth().confirmPasswordReset(oobCode, newPasswordValue);
                    
                    console.log('✅ Password reset successful via Firebase');
                    showNotification('Password reset successful! Redirecting to login...', 'success');
                    
                    // Optional: Notify backend
                    try {
                        await fetch(`https://backend-e-commerce-production-b9b1.up.railway.app/api/auth/password-updated`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                oobCode: oobCode,
                                timestamp: new Date().toISOString()
                            })
                        });
                    } catch (backendError) {
                        console.log('Backend notification failed (optional)', backendError);
                    }
                    
                    // Redirect to login page
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    
                } catch (error) {
                    console.error('❌ Reset error:', error);
                    
                    let errorMessage = 'Error resetting password. ';
                    
                    // Handle specific Firebase errors
                    if (error.code === 'auth/expired-action-code') {
                        errorMessage = 'This reset link has expired. Please request a new one.';
                        showExpiredLink(errorMessage, '⏰ Link Expired');
                        return;
                    } else if (error.code === 'auth/invalid-action-code') {
                        errorMessage = 'This reset link is invalid. Please request a new one.';
                        showExpiredLink(errorMessage, '❌ Invalid Link');
                        return;
                    } else if (error.code === 'auth/weak-password') {
                        errorMessage = 'Password is too weak. Please choose a stronger password.';
                    } else {
                        errorMessage += error.message;
                    }
                    
                    showNotification(errorMessage, 'error');
                    submitBtn.textContent = 'Reset Password';
                    submitBtn.disabled = false;
                }
            });
        }

        // Request new reset link
        function requestNewLink() {
            window.location.href = 'index.html';
            // You can also open the forgot password modal automatically
            setTimeout(() => {
                if (typeof openForgotPasswordModal === 'function') {
                    openForgotPasswordModal();
                }
            }, 500);
        }

        // Show notification function
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            
            let icon = 'check-circle';
            if (type === 'error') icon = 'times-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            if (type === 'info') icon = 'info-circle';
            
            notification.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Make functions globally available
        window.requestNewLink = requestNewLink;
        window.showNotification = showNotification;
    </script>
</body>
</html>
